<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <!-- 确保移动端视口正确设置，禁止用户缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>语音绘图工具 | Voice Draw</title>

    <!-- 引入 Google Fonts（可选，加载失败时自动回退到系统字体） -->
    <!-- display=swap 确保字体加载期间立即显示回退字体，不阻塞渲染 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;600;700&display=swap"
        rel="stylesheet" onerror="console.warn('Google Fonts 加载失败，将使用系统回退字体')">

    <style>
        /* ============================================================
           CSS 变量定义 - 统一管理主题色彩和设计令牌
           采用工业科技风：深色背景 + 高对比度荧光强调色
        ============================================================ */
        :root {
            /* 背景色系 */
            --bg-primary: #0a0a0f;
            /* 主背景 - 近黑色 */
            --bg-secondary: #12121a;
            /* 次背景 - 深灰蓝 */
            --bg-panel: rgba(18, 18, 26, 0.85);
            /* 面板背景 - 半透明深色 */

            /* 强调色系 */
            --accent-cyan: #00ffd5;
            /* 主强调色 - 青色荧光 */
            --accent-green: #00ff88;
            /* 成功状态绿 */
            --accent-orange: #ff6b35;
            /* 警告/错误橙 */
            --accent-red: #ff4444;
            /* 画笔红色 */
            --accent-blue: #4488ff;
            /* 画笔蓝色 */
            --accent-lime: #44ff88;
            /* 画笔绿色 */

            /* 文字色 */
            --text-primary: #e8e8ec;
            /* 主文字 - 浅灰白 */
            --text-secondary: #8888a0;
            /* 次文字 - 灰紫 */
            --text-muted: #555568;
            /* 弱化文字 */

            /* 边框与分割线 */
            --border-color: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(0, 255, 213, 0.3);

            /* 字体（含完整回退链，Google Fonts 不可用时自动降级） */
            --font-display: 'Space Grotesk', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', 'Cascadia Code', 'Consolas', 'Courier New', monospace;

            /* 其他 */
            --panel-blur: 20px;
            /* 毛玻璃模糊半径 */
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s ease;
        }

        /* ============================================================
           基础重置与全局样式
        ============================================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* 禁止滚动条，全屏沉浸体验 */
            background-color: var(--bg-primary);
            font-family: var(--font-display);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ============================================================
           Canvas 画布层 - 全屏铺满
        ============================================================ */
        #drawCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
            /* 画布在最底层 */
        }

        /* ============================================================
           状态栏面板 - 固定在底部，毛玻璃效果
        ============================================================ */
        #statusBar {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            /* 状态栏浮于画布之上 */
            width: calc(100% - 48px);
            max-width: 900px;

            /* 毛玻璃效果 */
            background: var(--bg-panel);
            backdrop-filter: blur(var(--panel-blur));
            -webkit-backdrop-filter: blur(var(--panel-blur));

            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px 24px;

            /* 微妙的顶部发光边框 */
            box-shadow:
                0 -1px 0 var(--border-glow),
                0 8px 32px rgba(0, 0, 0, 0.5);

            display: flex;
            align-items: center;
            gap: 20px;
            transition: all var(--transition-normal);
        }

        /* 状态栏悬停效果 */
        #statusBar:hover {
            border-color: rgba(0, 255, 213, 0.15);
            box-shadow:
                0 -1px 0 rgba(0, 255, 213, 0.5),
                0 12px 40px rgba(0, 0, 0, 0.6);
        }

        /* ============================================================
           语音监听指示器 - 脉冲动画圆点
        ============================================================ */
        .listening-indicator {
            position: relative;
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        /* 指示器核心圆点 */
        .indicator-core {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: var(--text-muted);
            transition: background-color var(--transition-normal);
        }

        /* 监听中状态的脉冲动画 */
        .listening-indicator.active .indicator-core {
            background-color: var(--accent-cyan);
            animation: pulse-glow 1.5s ease-in-out infinite;
        }

        /* 错误状态变红 */
        .listening-indicator.error .indicator-core {
            background-color: var(--accent-orange);
        }

        /* 绘图模式激活状态 - 指示器变为绿色 */
        .listening-indicator.drawing-mode .indicator-core {
            background-color: var(--accent-green);
            animation: pulse-glow-green 1.5s ease-in-out infinite;
        }

        @keyframes pulse-glow-green {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.6);
            }

            50% {
                box-shadow: 0 0 0 8px rgba(0, 255, 136, 0);
            }
        }

        /* 脉冲扩散动画关键帧 */
        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(0, 255, 213, 0.6);
            }

            50% {
                box-shadow: 0 0 0 8px rgba(0, 255, 213, 0);
            }
        }

        /* ============================================================
           识别文本显示区域
        ============================================================ */
        .recognition-text {
            flex: 1;
            min-width: 0;
            /* 允许文本截断 */
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: color var(--transition-fast);
        }

        /* 有识别内容时的样式 */
        .recognition-text.has-text {
            color: var(--text-primary);
        }

        /* 占位提示文字 */
        .recognition-text.placeholder {
            color: var(--text-muted);
            font-style: italic;
        }

        /* ============================================================
           分隔线
        ============================================================ */
        .status-divider {
            width: 1px;
            height: 28px;
            background: var(--border-color);
            flex-shrink: 0;
        }

        /* ============================================================
           当前颜色预览块
        ============================================================ */
        .color-preview {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .color-swatch {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all var(--transition-fast);
            box-shadow: 0 0 10px currentColor;
        }

        .color-label {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ============================================================
           状态消息 / 操作日志区
        ============================================================ */
        .status-message {
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--accent-green);
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex-shrink: 0;
            transition: color var(--transition-fast);
        }

        .status-message.warning {
            color: var(--accent-orange);
        }

        /* 绘图模式标签 */
        .mode-tag {
            font-family: var(--font-mono);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            transition: all var(--transition-normal);
            flex-shrink: 0;
            white-space: nowrap;
        }

        .mode-tag.active {
            background: rgba(0, 255, 136, 0.12);
            color: var(--accent-green);
            border: 1px solid rgba(0, 255, 136, 0.25);
        }

        /* ============================================================
           错误提示覆盖层 - 权限被拒等严重错误时显示
        ============================================================ */
        #errorOverlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            background: var(--bg-secondary);
            border: 1px solid var(--accent-orange);
            border-radius: 16px;
            padding: 32px 40px;
            text-align: center;
            max-width: 420px;
            box-shadow: 0 0 60px rgba(255, 107, 53, 0.15);
            display: none;
            /* 默认隐藏 */
        }

        #errorOverlay.visible {
            display: block;
            animation: fade-in 0.4s ease;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        #errorOverlay h2 {
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 700;
            color: var(--accent-orange);
            margin-bottom: 12px;
        }

        #errorOverlay p {
            font-family: var(--font-display);
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        #errorOverlay button {
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 600;
            color: var(--bg-primary);
            background: var(--accent-orange);
            border: none;
            border-radius: 8px;
            padding: 10px 28px;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        #errorOverlay button:hover {
            filter: brightness(1.15);
            transform: translateY(-1px);
        }

        /* ============================================================
           使用提示面板 - 页面加载后短暂显示
        ============================================================ */
        #hintPanel {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: var(--bg-panel);
            backdrop-filter: blur(var(--panel-blur));
            -webkit-backdrop-filter: blur(var(--panel-blur));
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 24px;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-secondary);
            opacity: 1;
            transition: opacity 0.8s ease 3s;
            /* 3秒延迟后淡出 */
        }

        #hintPanel.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        #hintPanel code {
            color: var(--accent-cyan);
            background: rgba(0, 255, 213, 0.08);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
        }

        /* ============================================================
           执行反馈闪烁效果 - 画布边缘闪光
        ============================================================ */
        .canvas-flash {
            animation: flash-border 0.35s ease;
        }

        @keyframes flash-border {
            0% {
                box-shadow: inset 0 0 0 0 transparent;
            }

            30% {
                box-shadow: inset 0 0 60px 0 rgba(0, 255, 213, 0.15);
            }

            100% {
                box-shadow: inset 0 0 0 0 transparent;
            }
        }

        /* ============================================================
           响应式适配
        ============================================================ */
        @media (max-width: 640px) {
            #statusBar {
                bottom: 12px;
                width: calc(100% - 24px);
                padding: 12px 16px;
                gap: 12px;
                border-radius: 12px;
            }

            .status-divider {
                display: none;
                /* 小屏隐藏分隔线 */
            }

            .color-label {
                display: none;
                /* 小屏隐藏颜色标签 */
            }

            .status-message {
                max-width: 120px;
                font-size: 12px;
            }

            #hintPanel {
                font-size: 11px;
                padding: 10px 16px;
                max-width: calc(100% - 32px);
            }
        }
    </style>
</head>

<body>

    <!-- ============================================================
         Canvas 画布 - 全屏绘图表面
         id 用于 JS 中获取绑定上下文
    ============================================================ -->
    <canvas id="drawCanvas"></canvas>

    <!-- ============================================================
         状态显示栏 - 底部浮动面板
         包含：监听指示器 | 识别文本 | 颜色预览 | 状态消息
    ============================================================ -->
    <div id="statusBar">
        <!-- 语音监听状态指示灯 -->
        <div class="listening-indicator" id="listeningIndicator" title="语音识别状态">
            <div class="indicator-core"></div>
        </div>

        <!-- 绘图模式标签 -->
        <div class="mode-tag" id="modeTag">待命</div>

        <!-- 实时识别到的语音文本 -->
        <div class="recognition-text placeholder" id="recognitionText">
            正在等待语音输入...
        </div>

        <!-- 分隔线 -->
        <div class="status-divider"></div>

        <!-- 当前画笔颜色预览 -->
        <div class="color-preview">
            <div class="color-swatch" id="colorSwatch"></div>
            <span class="color-label" id="colorLabel">颜色</span>
        </div>

        <!-- 操作执行状态反馈 -->
        <div class="status-message" id="statusMessage">就绪</div>
    </div>

    <!-- ============================================================
         使用提示面板 - 显示可用指令列表
         3秒后自动淡出
    ============================================================ -->
    <div id="hintPanel">
        先说 <code>开始画图</code> 唤醒 &nbsp;|&nbsp;
        指令：<code>画线</code><code>画圆</code><code>画矩形</code>
        <code>红色</code><code>蓝色</code><code>绿色</code>
        <code>清除</code><code>撤销</code>
        <br><span style="opacity:0.6">说 <code>退出画图</code> 暂停</span>
    </div>

    <!-- ============================================================
         错误提示覆盖层 - 权限拒绝或浏览器不支持时显示
    ============================================================ -->
    <div id="errorOverlay">
        <h2>无法启动语音识别</h2>
        <p id="errorMessage">您的浏览器可能不支持 Web Speech API，或者麦克风权限被拒绝。请使用 Chrome 或 Edge 浏览器，并确保通过 HTTPS 或 localhost 访问。</p>
        <button onclick="location.reload()">重新尝试</button>
    </div>


    <!-- ============================================================
         JavaScript 核心逻辑
         包含：配置常量、状态管理、语音识别、指令解析、绘图引擎、历史记录、初始化入口
    ============================================================ -->
    <script>
        /**
         * ========================================
         * 第一部分：配置常量与应用全局状态
         * ========================================
         */

        /** 应用配置对象 - 集中管理所有可调参数 */
        const CONFIG = {
            // 语音识别语言设置
            speechLang: 'zh-CN',                    // 中文简体

            // 图形绘制参数范围
            lineWidthMin: 2,                        // 最小线宽
            lineWidthMax: 5,                        // 最大线宽
            circleRadiusMin: 30,                    // 圆形最小半径
            circleRadiusMax: 120,                   // 圆形最大半径
            rectWidthMin: 40,                       // 矩形最小宽度
            rectWidthMax: 250,                      // 矩形最大宽度
            rectHeightMin: 30,                      // 矩形最小高度
            rectHeightMax: 180,                     // 矩形最大高度

            // 历史记录栈最大深度
            historyMaxSize: 50,

            // 默认画笔颜色
            defaultColor: '#00ffd5',

            // 画布网格背景色
            gridColor: 'rgba(255, 255, 255, 0.03)',

            // 图形发光效果强度
            glowIntensity: 12,

            // ---- 新增：语音识别优化参数 ----
            commandDebounceMs: 500,                 // 指令解析防抖延迟（毫秒）- 用户说完后等待此时间再执行
            speechFeedbackEnabled: true,            // 是否启用语音播报反馈（SpeechSynthesis）
        };

        /** 应用全局状态管理对象 */
        const appState = {
            isListening: false,                      // 是否正在监听语音
            drawingMode: false,                      // 绘图模式开关（唤醒保持机制：说"开始画图"开启，"退出画图"关闭）
            currentText: '',                         // 当前实时识别的文本
            lastRecognizedText: '',                  // 上一次确认的完整句子
            lastCommand: null,                       // 最近执行的命令信息
            currentColor: CONFIG.defaultColor,       // 当前画笔颜色
            statusMessage: '就绪',                   // 状态栏显示的消息
            error: null,                             // 错误信息
            historyStack: [],                        // 操作历史快照栈（用于撤销）
            recognition: null,                       // SpeechRecognition 实例引用
            canvas: null,                            // Canvas DOM 元素引用
            ctx: null,                               // Canvas 2D 渲染上下文
            commandDebounceTimer: null,               // 指令解析防抖定时器引用
        };


        /**
         * ========================================
         * 第二部分：指令映射表与解析器
         * ========================================
         *
         * 采用"关键词优先级匹配"策略：
         * 每个指令定义一组触发关键词（用 | 分隔），按数组顺序依次匹配。
         * 匹配到第一个即返回，避免歧义。
         */

        /** 指令映射表 - 定义所有支持的语音命令及其对应的操作
         *
         * 设计原则：
         * - 每个指令包含大量同义词/口语化表达，提高识别容错率
         * - 唤醒/退出指令放在最前面（最高优先级），始终生效不受绘图模式限制
         * - 关键词之间用 | 分隔，正则匹配时不区分大小写
         */
        const COMMAND_MAP = [
            // ============================================================
            // 第一优先级：唤醒/退出绘图模式（始终可触发，不受模式状态影响）
            // ============================================================
            {
                keywords: '开始画图|开始绘图|进入画图|进入绘图|开始画画|开始绘画|启动画图|唤醒|你好画图|打开画图',
                action: 'enterDrawingMode',
                label: '开始画图',
                description: '进入绘图模式，开始接收绘图指令'
            },
            {
                keywords: '退出画图|退出绘图|结束画图|结束绘图|停止画图|暂停画图|关闭画图|退出|休眠|再见|拜拜',
                action: 'exitDrawingMode',
                label: '退出画图',
                description: '退出绘图模式，暂停接收绘图指令'
            },

            // ============================================================
            // 第二优先级：图形绘制类指令（仅在绘图模式下生效）
            // ============================================================
            {
                keywords: '画线|画一条线|直线|画一条直线|连线|拉一条线|画条线|来条线|画直线|划线|画根线|画道线|线条',
                action: 'drawLine',
                label: '画线',
                description: '在随机位置绘制一条直线'
            },
            {
                keywords: '画圆|画一个圆|圆形|画圆形|画个圆|画个圈|圈圈|圆圈|画圈|来个圆|画球|圆形图案|画个圆圈|画个球|圆的|弄个圆',
                action: 'drawCircle',
                label: '画圆',
                description: '在随机位置绘制一个圆形'
            },
            {
                keywords: '画矩形|画一个矩形|长方形|画长方形|画个矩形|方块|画方块|矩形|长方|画个方块|画个框|方框|正方形|方形|四边形|画个方形|来个矩形',
                action: 'drawRect',
                label: '画矩形',
                description: '在随机位置绘制一个矩形'
            },

            // ============================================================
            // 第三优先级：颜色控制类指令（仅在绘图模式下生效）
            // ============================================================
            {
                keywords: '红色|改成红色|颜色红色|设为红色|换成红色|用红色|要红色|变红色|红|红颜色|红的|选红色|设红色|换红色',
                action: 'setColor',
                params: { color: '#ff4444' },
                label: '红色',
                description: '将画笔颜色更改为红色'
            },
            {
                keywords: '蓝色|改成蓝色|颜色蓝色|设为蓝色|换成蓝色|用蓝色|要蓝色|变蓝色|蓝|蓝颜色|蓝的|选蓝色|设蓝色|换蓝色',
                action: 'setColor',
                params: { color: '#4488ff' },
                label: '蓝色',
                description: '将画笔颜色更改为蓝色'
            },
            {
                keywords: '绿色|改成绿色|颜色绿色|设为绿色|换成绿色|用绿色|要绿色|变绿色|绿|绿颜色|绿的|选绿色|设绿色|换绿色',
                action: 'setColor',
                params: { color: '#44ff88' },
                label: '绿色',
                description: '将画笔颜色更改为绿色'
            },
            // 额外：恢复默认青色
            {
                keywords: '默认颜色|恢复颜色|原始颜色|初始颜色|青色|改成青色|换成青色|用青色',
                action: 'setColor',
                params: { color: '#00ffd5' },
                label: '默认色',
                description: '将画笔颜色恢复为默认青色'
            },

            // ============================================================
            // 第四优先级：画布操作类指令（仅在绘图模式下生效）
            // ============================================================
            {
                keywords: '清除|清空|清除画布|清空画布|擦除|全部清除|重置|擦掉|删掉|清屏|全删|重新开始|重来',
                action: 'clearCanvas',
                label: '清除',
                description: '清除画布上的所有内容'
            },
            {
                keywords: '撤销|撤回|上一步|后退|取消上一步|undo|退回|返回上一步|悔棋|撤销操作|撤回操作',
                action: 'undo',
                label: '撤销',
                description: '撤销上一步绘图操作'
            }
        ];

        /**
         * 指令解析函数
         * @param {string} text - 语音识别得到的原始文本
         * @returns {Object|null} - 匹配到的指令对象，未匹配则返回 null
         *
         * 解析流程：
         * 1. 清理输入文本（去首尾空白）
         * 2. 遍历 COMMAND_MAP，逐条进行正则测试
         * 3. 返回首个命中的指令对象（包含 action 和 params）
         */
        function parseCommand(text) {
            if (!text || typeof text !== 'string') return null;

            const cleanText = text.trim();

            for (const cmd of COMMAND_MAP) {
                // 构建正则表达式：关键词之间用 | 分隔，全局不区分大小写匹配
                try {
                    const regex = new RegExp(cmd.keywords, 'i');
                    if (regex.test(cleanText)) {
                        return cmd;
                    }
                } catch (e) {
                    console.warn('指令正则构建失败:', cmd.keywords, e);
                    continue;
                }
            }

            return null; // 无任何指令匹配
        }


        /**
         * ========================================
         * 第三部分：语音合成播报模块（SpeechSynthesis）
         * ========================================
         *
         * 使用浏览器原生 SpeechSynthesis API 进行语音反馈：
         * - 解析失败时自动播报"没听清，请再说一次"
         * - 模式切换时播报确认信息
         * - 指令执行成功时可选择性播报确认
         */

        /** 语音合成管理器 */
        const SpeechFeedback = {
            /** 当前正在使用的语音合成实例（用于取消） */
            currentUtterance: null,

            /**
             * 播报一段文字
             * @param {string} text - 要朗读的文本内容
             * @param {Object} options - 可选配置
             * @param {number} options.rate - 语速（默认1.0，范围0.1-10）
             * @param {number} options.pitch - 音调（默认1.0，范围0-2）
             */
            speak(text, options = {}) {
                if (!CONFIG.speechFeedbackEnabled) return;
                if (!('speechSynthesis' in window)) {
                    console.warn('浏览器不支持 SpeechSynthesis API');
                    return;
                }

                // 取消之前可能还在播放的语音
                this.cancel();

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';              // 中文语音
                utterance.rate = options.rate || 1.0;   // 正常语速
                utterance.pitch = options.pitch || 1.0; // 正常音调
                utterance.volume = 0.8;                 // 音量 80%

                // 尝试选择中文语音（优先级：中文 > 默认）
                const voices = speechSynthesis.getVoices();
                const zhVoice = voices.find(v => v.lang.startsWith('zh'));
                if (zhVoice) {
                    utterance.voice = zhVoice;
                }

                this.currentUtterance = utterance;
                speechSynthesis.speak(utterance);

                console.log('🔊 语音播报:', text);
            },

            /**
             * 取消当前正在播放的语音
             */
            cancel() {
                if ('speechSynthesis' in window) {
                    speechSynthesis.cancel();
                }
                this.currentUtterance = null;
            },

            /**
             * 预设快捷播报方法
             */
            notUnderstood() {
                this.speak('没听清，请再说一次', { rate: 1.1 });
            },

            modeEntered() {
                this.speak('已进入绘图模式，请下达指令');
            },

            modeExited() {
                this.speak('已退出绘图模式');
            },

            commandExecuted(label) {
                this.speak('好的，已' + label, { rate: 1.15 });
            }
        };

        // 确保语音列表加载完成（Chrome 需要异步加载）
        if ('speechSynthesis' in window) {
            speechSynthesis.onvoiceschanged = function () {
                console.log('🔊 语音合成引擎就绪，可用语音数:', speechSynthesis.getVoices().length);
            };
        }


        /**
         * ========================================
         * 第三部分：历史记录管理模块（撤销功能）
         * ========================================
         *
         * 使用命令模式快照栈实现撤销：
         * 每次绘图操作前，先将当前画布完整状态保存为 ImageData 快照。
         * 撤销时弹出最近的快照并恢复到画布。
         */

        /** 历史记录管理器 */
        const HistoryManager = {
            /**
             * 将当前画布状态压入历史栈
             * 在每次绘图操作前调用，保存当前画面以便后续撤销
             */
            push() {
                if (!appState.ctx || !appState.canvas) return;

                // 获取当前画布完整的像素数据快照
                const snapshot = appState.ctx.getImageData(
                    0, 0,
                    appState.canvas.width,
                    appState.canvas.height
                );

                appState.historyStack.push(snapshot);

                // 限制栈深度，防止内存溢出
                if (appState.historyStack.length > CONFIG.historyMaxSize) {
                    appState.historyStack.shift(); // 移除最旧的记录
                }
            },

            /**
             * 弹出最近一次快照并恢复到画布（撤销操作）
             * @returns {boolean} - 是否成功撤销
             */
            pop() {
                if (appState.historyStack.length === 0) {
                    updateStatus('没有可撤销的操作', true); // 无历史记录时给出警告提示
                    return false;
                }

                const snapshot = appState.historyStack.pop();
                appState.ctx.putImageData(snapshot, 0, 0);
                return true;
            },

            /**
             * 清空整个历史栈
             * 在清除画布时调用
             */
            clear() {
                appState.historyStack = [];
            }
        };


        /**
         * ========================================
         * 第四部分：绘图引擎模块
         * ========================================
         *
         * 封装所有 Canvas 绘图操作。
         * 每个图形使用随机位置/尺寸参数生成，
         * 并带有微发光效果增强视觉表现力。
         */

        /** 工具函数：生成指定范围内的随机整数 */
        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        /** 工具函数：获取安全的随机坐标（留出边距防止图形被裁切）
         *  注意：必须使用 window.innerWidth/Height（CSS 像素），
         *  而非 canvas.width/height（物理像素），因为 ctx 已被 scale(dpr) 变换
         */
        function randomPosition(margin = 80) {
            const w = window.innerWidth;     // CSS 像素宽度（如 1920）
            const h = window.innerHeight;    // CSS 像素高度（如 1080）
            return {
                x: randomInt(margin, w - margin),
                y: randomInt(margin, h - margin)
            };
        }

        /** 设置当前画笔样式（颜色、线宽、发光效果） */
        function applyBrushStyle() {
            const ctx = appState.ctx;
            ctx.strokeStyle = appState.currentColor;
            ctx.fillStyle = appState.currentColor;
            ctx.lineWidth = randomInt(CONFIG.lineWidthMin, CONFIG.lineWidthMax);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // 发光阴影效果 - 让绘制的图形有微光感
            ctx.shadowColor = appState.currentColor;
            ctx.shadowBlur = CONFIG.glowIntensity;
        }

        /** 重置阴影设置（避免影响后续非发光元素） */
        function resetShadow() {
            appState.ctx.shadowColor = 'transparent';
            appState.ctx.shadowBlur = 0;
        }

        /** 绘图引擎对象 - 提供各图形的绘制方法 */
        const DrawingEngine = {

            /**
             * 画线 - 在两个随机点之间绘制直线
             * 起点(x1,y1) 和终点(x2,y2) 均为画布内随机位置
             */
            drawLine() {
                applyBrushStyle();
                const ctx = appState.ctx;
                const p1 = randomPosition();
                const p2 = randomPosition();

                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.stroke();
                resetShadow();
            },

            /**
             * 画圆 - 在随机位置绘制填充圆形
             * 圆心和半径均为随机值
             */
            drawCircle() {
                applyBrushStyle();
                const ctx = appState.ctx;
                const center = randomPosition(100);      // 圆心位置（较大边距）
                const radius = randomInt(CONFIG.circleRadiusMin, CONFIG.circleRadiusMax);

                ctx.beginPath();
                ctx.arc(center.x, center.y, radius, 0, Math.PI * 2);
                ctx.fill();                              // 填充圆形
                ctx.stroke();                            // 同时描边增加清晰度
                resetShadow();
            },

            /**
             * 画矩形 - 在随机位置绘制填充矩形
             * 左上角坐标和宽高均为随机值
             */
            drawRect() {
                applyBrushStyle();
                const ctx = appState.ctx;
                const pos = randomPosition(60);
                const w = randomInt(CONFIG.rectWidthMin, CONFIG.rectWidthMax);
                const h = randomInt(CONFIG.rectHeightMin, CONFIG.rectHeightMax);

                // 确保矩形不超出画布右下边界（使用 CSS 像素尺寸）
                const safeW = Math.min(w, window.innerWidth - pos.x - 20);
                const safeH = Math.min(h, window.innerHeight - pos.y - 20);

                ctx.fillRect(pos.x, pos.y, safeW, safeH);
                ctx.strokeRect(pos.x, pos.y, safeW, safeH);
                resetShadow();
            },

            /**
             * 更改画笔颜色
             * @param {string} color - 目标颜色的十六进制值
             */
            setColor(color) {
                appState.currentColor = color;
                updateColorPreview(color);              // 同步更新 UI 颜色预览
            },

            /**
             * 清除画布 - 清空所有绘制内容并重绘网格背景
             */
            clearCanvas() {
                clearCanvasWithGrid();                  // 调用带背景重绘的清除方法
                HistoryManager.clear();                  // 清空历史栈（无法撤销清除操作）
            },

            /**
             * 撤销 - 恢复到上一个历史快照
             */
            undo() {
                return HistoryManager.pop();
            }
        };


        /**
         * ========================================
         * 第五部分：UI 更新函数
         * ========================================
         *
         * 所有对 DOM 的更新操作集中在此处，
         * 保持渲染逻辑与业务逻辑分离。
         */

        /** DOM 元素缓存 - 避免重复查询 */
        let DOM = {};

        /** 初始化 DOM 元素引用 */
        function cacheDOMElements() {
            DOM = {
                canvas: document.getElementById('drawCanvas'),
                statusBar: document.getElementById('statusBar'),
                listeningIndicator: document.getElementById('listeningIndicator'),
                modeTag: document.getElementById('modeTag'),           // 绘图模式标签
                recognitionText: document.getElementById('recognitionText'),
                colorSwatch: document.getElementById('colorSwatch'),
                colorLabel: document.getElementById('colorLabel'),
                statusMessage: document.getElementById('statusMessage'),
                hintPanel: document.getElementById('hintPanel'),
                errorOverlay: document.getElementById('errorOverlay'),
                errorMessage: document.getElementById('errorMessage'),
            };
        }

        /**
         * 更新识别文本显示
         * @param {string} text - 要显示的文本内容
         */
        function updateRecognitionText(text) {
            if (!DOM.recognitionText) return;

            if (!text || text.trim() === '') {
                DOM.recognitionText.textContent = '正在等待语音输入...';
                DOM.recognitionText.className = 'recognition-text placeholder';
            } else {
                DOM.recognitionText.textContent = text;
                DOM.recognitionText.className = 'recognition-text has-text';
            }
        }

        /**
         * 更新状态消息（操作结果反馈）
         * @param {string} message - 状态消息文本
         * @param {boolean} isWarning - 是否为警告状态（橙色显示）
         */
        function updateStatus(message, isWarning = false) {
            if (!DOM.statusMessage) return;
            DOM.statusMessage.textContent = message;
            DOM.statusMessage.className = isWarning ? 'status-message warning' : 'status-message';
        }

        /**
         * 更新颜色预览块的显示
         * @param {string} color - 十六进制颜色值
         */
        function updateColorPreview(color) {
            if (DOM.colorSwatch) {
                DOM.colorSwatch.style.backgroundColor = color;
                DOM.colorSwatch.style.color = color;    // box-shadow 用 currentColor
            }
            if (DOM.colorLabel) {
                // 从颜色值推断名称用于标签显示
                const names = {
                    '#ff4444': '红', '#4488ff': '蓝', '#44ff88': '绿',
                    '#00ffd5': '青'
                };
                DOM.colorLabel.textContent = names[color] || '自定义';
            }
        }

        /**
         * 切换语音监听指示器的视觉状态
         * @param {string} state - 'active'(监听中) | 'idle'(空闲) | 'error'(错误)
         */
        function setListeningIndicator(state) {
            if (!DOM.listeningIndicator) return;
            // 移除所有可能的状态类名
            DOM.listeningIndicator.className = 'listening-indicator ' + state;

            // 如果处于绘图模式，额外添加绘图模式样式
            if (appState.drawingMode && (state === 'active' || state === 'idle')) {
                DOM.listeningIndicator.classList.add('drawing-mode');
            }
        }

        /**
         * 更新绘图模式标签的显示
         * 根据当前模式状态切换"待命"/"绘图中"的视觉呈现
         */
        function updateModeTag() {
            if (!DOM.modeTag) return;

            if (appState.drawingMode) {
                DOM.modeTag.textContent = '绘图中';
                DOM.modeTag.className = 'mode-tag active';
            } else {
                DOM.modeTag.textContent = '待命';
                DOM.modeTag.className = 'mode-tag';
            }

            // 同步更新监听指示器的绘图模式样式
            setListeningIndicator(appState.isListening ? 'active' : 'idle');
        }

        /**
         * 触发画布执行反馈动画（边缘闪烁）
         */
        function triggerCanvasFlash() {
            if (DOM.canvas) {
                DOM.canvas.classList.remove('canvas-flash');
                // 强制 reflow 以重新触发动画
                void DOM.canvas.offsetWidth;
                DOM.canvas.classList.add('canvas-flash');
            }
        }

        /**
         * 显示错误提示覆盖层
         * @param {string} message - 错误描述信息
         */
        function showError(message) {
            if (DOM.errorMessage) DOM.errorMessage.textContent = message;
            if (DOM.errorOverlay) DOM.errorOverlay.classList.add('visible');
            setListeningIndicator('error');
        }

        /**
         * 隐藏使用提示面板（带淡出动画）
         */
        function hideHintPanel() {
            if (DOM.hintPanel) {
                setTimeout(() => {
                    DOM.hintPanel.classList.add('fade-out');
                }, 3000); // 3秒后开始淡出
            }
        }


        /**
         * ========================================
         * 第六部分：Canvas 初始化与工具函数
         * ========================================
         */

        /**
         * 初始化 Canvas 画布
         * - 设置尺寸为窗口大小
         * - 绘制初始网格背景
         * - 缓存 2D 渲染上下文
         */
        function initCanvas() {
            appState.canvas = DOM.canvas;
            appState.ctx = appState.canvas.getContext('2d');

            // 设置画布实际像素尺寸（匹配窗口大小）
            resizeCanvas();

            // 监听窗口尺寸变化，自动调整画布
            window.addEventListener('resize', debounce(resizeCanvas, 200));

            // 绘制初始背景
            drawGridBackground();
            updateColorPreview(appState.currentColor);
        }

        /**
         * 调整画布尺寸以填满窗口
         * 注意：改变 canvas.width 会清空画布内容，
         * 因此需要在 resize 后考虑是否恢复内容
         */
        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;   // 支持高 DPI 屏幕（Retina）
            const w = window.innerWidth;
            const h = window.innerHeight;

            // 设置 CSS 显示尺寸
            appState.canvas.style.width = w + 'px';
            appState.canvas.style.height = h + 'px';

            // 设置实际像素分辨率（考虑设备像素比）
            appState.canvas.width = Math.floor(w * dpr);
            appState.canvas.height = Math.floor(h * dpr);

            // 缩放上下文以匹配 DPR
            appState.ctx.scale(dpr, dpr);

            // 重绘背景
            drawGridBackground();
        }

        /**
         * 绘制网格背景纹理
         * 使用极低透明度的线条营造专业绘图软件的氛围
         */
        function drawGridBackground() {
            const ctx = appState.ctx;
            const w = window.innerWidth;
            const h = window.innerHeight;
            const gridSize = 40;                         // 网格单元大小（像素）

            // 填充纯色底色
            ctx.fillStyle = CONFIG.defaultColor === '#00ffd5' ? '#0a0a0f' : '#0a0a0f';
            ctx.fillRect(0, 0, w, h);

            // 绘制网格线
            ctx.strokeStyle = CONFIG.gridColor;
            ctx.lineWidth = 0.5;
            ctx.shadowBlur = 0;

            ctx.beginPath();
            // 垂直线
            for (let x = 0; x <= w; x += gridSize) {
                ctx.moveTo(x, 0);
                ctx.lineTo(x, h);
            }
            // 水平线
            for (let y = 0; y <= h; y += gridSize) {
                ctx.moveTo(0, y);
                ctx.lineTo(w, y);
            }
            ctx.stroke();
        }

        /**
         * 清除画布并重绘网格背景（保留背景纹理）
         */
        function clearCanvasWithGrid() {
            // 先保存当前变换状态
            appState.ctx.save();
            // 重置变换矩阵（消除 DPR 缩放的影响）
            appState.ctx.setTransform(1, 0, 0, 1, 0, 0);
            // 清除整个画布像素
            appState.ctx.clearRect(0, 0, appState.canvas.width, appState.canvas.height);
            // 恢复变换
            appState.ctx.restore();
            // 重绘网格背景
            drawGridBackground();
        }

        /**
         * 防抖工具函数
         * @param {Function} fn - 需要防抖的函数
         * @param {number} delay - 延迟时间（毫秒）
         * @returns {Function} - 防抖包装后的函数
         */
        function debounce(fn, delay) {
            let timer = null;
            return function (...args) {
                clearTimeout(timer);
                timer = setTimeout(() => fn.apply(this, args), delay);
            };
        }


        /**
         * ========================================
         * 第七部分：语音识别模块（Web Speech API）
         * ========================================
         *
         * 核心交互逻辑所在：
         * - 使用浏览器原生 SpeechRecognition API
         * - 配置为中文持续监听模式
         * - 自动处理权限请求、错误恢复、重启机制
         */

        /**
         * 初始化语音识别引擎
         * 检测浏览器兼容性 → 创建实例 → 配置参数 → 注册回调 → 启动监听
         */
        function initSpeechRecognition() {
            // ---- 浏览器兼容性检测 ----
            // Chrome 使用 webkit 前缀，标准 API 为 window.SpeechRecognition
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (!SpeechRecognition) {
                showError(
                    '您的浏览器不支持 Web Speech API（语音识别）。' +
                    '请使用最新版本的 Google Chrome 或 Microsoft Edge 浏览器。'
                );
                return false;
            }

            // ---- 创建识别实例 ----
            const recognition = new SpeechRecognition();

            // ---- 配置识别参数 ----
            recognition.lang = CONFIG.speechLang;       // 语言：中文简体
            recognition.continuous = true;              // 持续模式：不会在单次识别后停止
            recognition.interimResults = true;          // 返回中间结果（说话过程中就能看到文字）
            recognition.maxAlternatives = 1;            // 每段音频只返回最佳匹配结果

            // ---- 注册事件回调 ----

            /**
             * onresult - 识别结果回调（最核心的事件）
             *
             * 优化后的处理流程：
             * 1. 实时更新状态栏显示识别文本（用户能立即看到自己在说什么）
             * 2. 仅当收到最终确认结果（isFinal）时，启动防抖定时器
             * 3. 防抖等待期间如果收到新的结果，重置计时器
             * 4. 防抖到期后，才执行指令解析和执行
             *    这确保了用户说完一整句话、短暂停顿后才会触发动作
             */
            recognition.onresult = function (event) {
                let interimTranscript = '';             // 临时的、还在变化的识别文本
                let finalTranscript = '';               // 最终确认的识别文本

                // 遍历所有结果（event.results 是一个类数组对象）
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const result = event.results[i];

                    if (result.isFinal) {
                        // isFinal=true 表示这段话已经说完并被最终确认
                        finalTranscript += result[0].transcript;
                    } else {
                        // isFinal=false 表示还在说话过程中，结果可能变化
                        interimTranscript += result[0].transcript;
                    }
                }

                // ---- 步骤1：始终实时更新 UI 显示（让用户看到自己说了什么）----
                const displayText = finalTranscript || interimTranscript;
                updateRecognitionText(displayText);
                appState.currentText = displayText;

                // ---- 步骤2：仅对最终结果进行防抖延迟解析 ----
                if (finalTranscript) {
                    // 清除之前的防抖定时器（用户可能还在连续说下一句）
                    if (appState.commandDebounceTimer) {
                        clearTimeout(appState.commandDebounceTimer);
                    }

                    // 设置新的防抖定时器：等待用户停顿后再执行
                    appState.commandDebounceTimer = setTimeout(function () {
                        appState.commandDebounceTimer = null;
                        handleVoiceCommand(finalTranscript);     // 停顿结束后才真正解析执行
                    }, CONFIG.commandDebounceMs);

                    console.log('📝 收到语音（防抖中）:', finalTranscript.trim());
                }
            };

            /**
             * onerror - 错误处理回调
             * 处理各种可能的语音识别错误情况
             */
            recognition.onerror = function (event) {
                console.warn('语音识别错误:', event.error);

                switch (event.error) {
                    case 'not-allowed':
                        // 用户拒绝了麦克风权限
                        showError(
                            '麦克风权限被拒绝。\n\n' +
                            '请点击地址栏左侧的锁/相机图标，允许麦克风访问权限后刷新页面。' +
                            '\n\n注意：语音识别需要麦克风权限才能工作。'
                        );
                        break;

                    case 'no-speech':
                        // 未检测到语音输入（静音），这是正常情况，无需特殊处理
                        updateStatus('未检测到语音...', true);
                        break;

                    case 'network':
                        // 网络问题（部分浏览器需要联网才能使用语音识别）
                        updateStatus('网络连接异常', true);
                        break;

                    case 'aborted':
                        // 识别被中止（通常是手动停止或被新的 start 替代）
                        break;

                    default:
                        // 其他未知错误
                        console.error('未知语音识别错误:', event.error);
                        updateStatus('识别出错: ' + event.error, true);
                }
            };

            /**
             * onend - 识别结束回调
             * 关键：continuous 模式下也会因超时等原因自动停止，
             * 所以需要在此处自动重启以保持持续监听！
             */
            recognition.onend = function () {
                // 如果应用仍然期望处于监听状态，自动重启
                // （除非是用户主动停止或有错误导致的中止）
                if (appState.isListening && !document.hidden) {
                    // 短暂延迟后重启，避免过于频繁的重启循环
                    setTimeout(function () {
                        try {
                            recognition.start();
                        } catch (e) {
                            // 如果已经在运行中，start() 会抛错，忽略即可
                            console.log('重启识别（已在运行中）');
                        }
                    }, 100);
                } else {
                    appState.isListening = false;
                    setListeningIndicator('idle');
                }
            };

            /**
             * onstart - 识别成功启动回调
             */
            recognition.onstart = function () {
                appState.isListening = true;
                setListeningIndicator('active');
                updateStatus('正在聆听...');
                console.log('✅ 语音识别已启动，等待语音输入...');
            };

            // 保存实例引用到全局状态
            appState.recognition = recognition;
            return true;
        }

        /**
         * 启动语音识别监听
         * 调用 recognition.start() 开始捕获麦克风音频
         */
        function startListening() {
            if (!appState.recognition) {
                console.error('语音识别实例未初始化');
                return;
            }

            try {
                appState.recognition.start();
            } catch (e) {
                console.warn('启动失败（可能已在运行）:', e);
                // 已经在运行中不是致命错误，继续即可
            }
        }


        /**
         * ========================================
         * 第八部分：语音指令处理中枢
         * ========================================
         *
         * 连接语音识别输出与绘图引擎的桥梁：
         * 接收识别文本 → 解析指令 → 执行操作 → 反馈状态
         */

        /**
         * 处理语音指令的核心函数
         * @param {string} text - 语音识别得到的最终确认文本（防抖后调用）
         *
         * 完整流程（优化版）：
         * 0. 优先检查唤醒/退出指令（始终生效）
         * 1. 检查是否在绘图模式下（非绘图指令需绘图模式才执行）
         * 2. 调用 parseCommand 进行关键词匹配
         * 3. 若匹配成功：执行操作 + 语音反馈
         * 4. 若未匹配且处于绘图模式：语音播报"没听清"
         */
        function handleVoiceCommand(text) {
            if (!text) return;

            const cleanText = text.trim();
            console.log('🎤 处理语音指令:', cleanText);

            // ---- 步骤0：先尝试解析指令（唤醒/退出指令不受模式限制）----
            const command = parseCommand(cleanText);

            if (!command) {
                // 未匹配到任何已知指令
                if (appState.drawingMode) {
                    // 在绘图模式下但没听清 → 语音播报提示用户重说
                    console.log('⏭️ 绘图模式下未匹配指令:', cleanText);
                    updateStatus('未识别: ' + cleanText, true);
                    SpeechFeedback.notUnderstood();     // "没听清，请再说一次"
                } else {
                    // 非绘图模式下的无关语音，静默忽略
                    console.log('💤 非绘图模式，忽略:', cleanText);
                }
                return;
            }

            // ---- 步骤1：处理特殊系统指令（唤醒/退出）----
            if (command.action === 'enterDrawingMode') {
                if (appState.drawingMode) {
                    updateStatus('已在绘图中');
                    SpeechFeedback.speak('已经在绘图模式中了哦');
                } else {
                    appState.drawingMode = true;
                    updateModeTag();                     // 更新 UI 模式标签为"绘图中"
                    updateStatus('已进入绘图模式');
                    SpeechFeedback.modeEntered();        // "已进入绘图模式，请下达指令"
                    triggerCanvasFlash();
                }
                appState.lastCommand = command;
                return;                                 // 唤醒指令到此结束，不继续走绘图逻辑
            }

            if (command.action === 'exitDrawingMode') {
                if (!appState.drawingMode) {
                    updateStatus('已在待命状态');
                    SpeechFeedback.speak('已经不在绘图模式了');
                } else {
                    appState.drawingMode = false;
                    updateModeTag();                     // 更新 UI 模式标签为"待命"
                    updateStatus('已退出绘图模式');
                    SpeechFeedback.modeExited();         // "已退出绘图模式"
                }
                appState.lastCommand = command;
                return;                                 // 退出指令到此结束
            }

            // ---- 步骤2：绘图模式门控 ----
            // 唤醒/退出之外的指令（画线、画圆、颜色等）必须在绘图模式下才执行
            if (!appState.drawingMode) {
                console.log('🔒 非绘图模式，拒绝执行:', command.label);
                updateStatus('请先说"开始画图"', true);
                // 提示用户需要先唤醒
                SpeechFeedback.speak('请先说开始画图');
                return;
            }

            // ---- 步骤3：记录并执行绘图指令 ----
            appState.lastCommand = command;
            console.log('🎯 匹配到指令:', command.label, '-', command.description);

            let success = true;
            let feedbackMsg = '';

            switch (command.action) {

                // ---- 绘图类操作（需要先保存历史快照）----
                case 'drawLine':
                    HistoryManager.push();              // 保存当前状态用于撤销
                    DrawingEngine.drawLine();
                    feedbackMsg = '已画线';
                    break;

                case 'drawCircle':
                    HistoryManager.push();
                    DrawingEngine.drawCircle();
                    feedbackMsg = '已画圆';
                    break;

                case 'drawRect':
                    HistoryManager.push();
                    DrawingEngine.drawRect();
                    feedbackMsg = '已画矩形';
                    break;

                // ---- 颜色控制（不需要历史快照）----
                case 'setColor':
                    DrawingEngine.setColor(command.params.color);
                    feedbackMsg = '颜色: ' + command.label;
                    break;

                // ---- 画布清除（需要先保存历史快照）----
                case 'clearCanvas':
                    HistoryManager.push();              // 保存清除前的状态
                    DrawingEngine.clearCanvas();
                    feedbackMsg = '画布已清除';
                    break;

                // ---- 撤销操作（内部处理历史栈）----
                case 'undo':
                    success = DrawingEngine.undo();
                    if (success) {
                        feedbackMsg = '已撤销';
                    }
                    // undo 方法内部会在无历史时自行更新警告状态
                    break;

                default:
                    console.warn('未知指令 action:', command.action);
                    success = false;
            }

            // ---- 步骤4：更新状态反馈 + 语音播报确认 ----
            if (success && feedbackMsg) {
                updateStatus(feedbackMsg);
                triggerCanvasFlash();                   // 视觉反馈闪烁
                SpeechFeedback.commandExecuted(command.label);  // "好的，已画圆"
            } else if (!success) {
                SpeechFeedback.notUnderstood();         // 执行失败也提示重试
            }
        }


        /**
         * ========================================
         * 第九部分：应用初始化入口
         * ========================================
         *
         * 页面加载完成后自动执行的启动流程：
         * 1. 缓存 DOM 引用
         * 2. 初始化 Canvas 画布
         * 3. 初始化语音识别引擎
         * 4. 请求麦克风权限并开始监听
         * 5. 隐藏提示面板
         */

        /**
         * 应用主初始化函数
         * 作为 DOMContentLoaded 事件的处理程序
         */
        function initApp() {
            console.log('========================================');
            console.log('  语音绘图工具 VoiceDraw - 初始化中...');
            console.log('========================================');

            // 步骤1：缓存所有需要的 DOM 元素引用
            cacheDOMElements();

            // 步骤2：初始化 Canvas 画布（含网格背景）
            initCanvas();

            // 步骤3：初始化绘图模式 UI（默认"待命"状态）
            updateModeTag();

            // 步骤4：初始化语音识别引擎
            const speechReady = initSpeechRecognition();

            if (speechReady) {
                // 步骤5：启动语音监听（此操作会触发浏览器麦克风权限弹窗）
                startListening();

                // 步骤6：3秒后淡出使用提示面板
                hideHintPanel();
            }

            console.log('✅ 应用初始化完成');
            console.log('💡 使用流程：先说"开始画图" → 再说绘图指令 → 说"退出画图"结束');
            console.log('💡 试试说："开始画图"、"画个圈圈"、"改成红色"、"撤销"...');

            // 全局暴露调试接口（方便在控制台手动测试）
            window.VoiceDraw = {
                state: appState,
                config: CONFIG,
                parseCommand: parseCommand,
                handleVoiceCommand: handleVoiceCommand,
                DrawingEngine: DrawingEngine,
                HistoryManager: HistoryManager,
                SpeechFeedback: SpeechFeedback,          // 暴露语音播报模块
            };
        }

        // ---- 页面加载完成后自动启动应用 ----
        document.addEventListener('DOMContentLoaded', initApp);

    </script>
